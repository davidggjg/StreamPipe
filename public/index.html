<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamPipe 🚰</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0a0f;
    --surface: #12121a;
    --border:  #1e1e2e;
    --accent:  #00e5ff;
    --accent2: #7c3aed;
    --green:   #00e676;
    --red:     #ff1744;
    --yellow:  #ffd600;
    --text:    #e2e2f0;
    --muted:   #5a5a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 2px; color: var(--accent);
  }
  .logo small { font-size: 0.65rem; color: var(--muted); margin-right: 8px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .badge {
    font-size: 0.68rem; padding: 3px 10px;
    border-radius: 20px; border: 1px solid;
    display: flex; align-items: center; gap: 4px;
  }
  .badge.ok  { border-color: rgba(0,230,118,0.3); color: var(--green); }
  .badge.err { border-color: rgba(255,23,68,0.3);  color: var(--red); }
  .badge.warn{ border-color: rgba(255,214,0,0.3);  color: var(--yellow); }
  .settings-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); width: 38px; height: 38px;
    border-radius: 8px; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .settings-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(45deg); }
  main {
    position: relative; z-index: 1;
    max-width: 620px; margin: 50px auto; padding: 0 20px;
  }
  .hero { text-align: center; margin-bottom: 36px; }
  .hero h1 { font-size: 2.4rem; font-weight: 900; line-height: 1.1; margin-bottom: 8px; }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero p { color: var(--muted); font-size: 0.9rem; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 160px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  .field { margin-bottom: 16px; }
  label {
    display: block; font-size: 0.7rem; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 13px; color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 0.92rem;
    outline: none; transition: all 0.2s; direction: ltr; text-align: left;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
  input::placeholder { color: var(--muted); opacity: 0.45; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0097a7);
    color: #000; font-family: 'Heebo', sans-serif;
    font-size: 0.97rem; font-weight: 700; border: none;
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    margin-top: 4px; position: relative; overflow: hidden;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,255,0.25); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.loading::after {
    content: ''; position: absolute; top: 0; right: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { to { right: 100%; } }
  #status-box { margin-top: 18px; display: none; }
  .status {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 15px; border-radius: 10px;
    font-size: 0.87rem; border: 1px solid; line-height: 1.5;
  }
  .status.loading { background: rgba(0,229,255,0.04); border-color: rgba(0,229,255,0.2); color: var(--accent); }
  .status.success { background: rgba(0,230,118,0.04); border-color: rgba(0,230,118,0.2); color: var(--green); }
  .status.error   { background: rgba(255,23,68,0.04);  border-color: rgba(255,23,68,0.2);  color: var(--red); }
  .spinner {
    width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px;
    border: 2px solid rgba(0,229,255,0.2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-link {
    display: block; margin-top: 10px; padding: 11px 13px;
    background: rgba(0,230,118,0.04); border: 1px solid rgba(0,230,118,0.2);
    border-radius: 8px; color: var(--green); text-decoration: none;
    font-family: 'Space Mono', monospace; font-size: 0.72rem;
    word-break: break-all; direction: ltr; text-align: left; transition: background 0.2s;
  }
  .result-link:hover { background: rgba(0,230,118,0.09); }
  .pipe-diagram {
    display: flex; align-items: center; justify-content: center;
    margin-top: 24px; padding: 16px;
    background: rgba(255,255,255,0.015); border: 1px solid var(--border);
    border-radius: 12px; font-size: 0.7rem; color: var(--muted);
  }
  .pipe-node { text-align: center; padding: 4px 12px; }
  .pipe-node .icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .pipe-arrow {
    flex: 1; max-width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent)); position: relative;
  }
  .pipe-arrow::after {
    content: ''; position: absolute; top: -4px; left: 0;
    width: 10px; height: 10px; background: var(--accent);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    animation: flow 1.8s ease-in-out infinite;
  }
  @keyframes flow {
    0%   { left: 0; opacity: 0; }
    20%  { opacity: 1; } 80% { opacity: 1; }
    100% { left: calc(100% - 10px); opacity: 0; }
  }

  /* ── מודל הגדרות ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%;
    max-width: 420px; margin: 16px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .modal-title { font-size: 1rem; font-weight: 700; }
  .close-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .close-btn:hover { border-color: var(--red); color: var(--red); }
  .btn-save {
    width: 100%; padding: 13px; background: var(--accent2); color: #fff;
    font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer; margin-top: 6px;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .btn-save:hover:not(:disabled) { background: #6d28d9; transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-save.loading::after {
    content: ''; position: absolute; top: 0; right: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 1.2s infinite;
  }
  .key-result {
    margin-top: 12px; padding: 11px 14px; border-radius: 8px;
    font-size: 0.83rem; line-height: 1.5; border: 1px solid; display: none;
  }
  .key-result.ok  { background: rgba(0,230,118,0.05); border-color: rgba(0,230,118,0.25); color: var(--green); }
  .key-result.err { background: rgba(255,23,68,0.05);  border-color: rgba(255,23,68,0.25);  color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">STREAMPIPE <small>Drive → Archive</small></div>
  <div class="header-left">
    <div id="keys-badge" class="badge warn">⏳ טוען...</div>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>צינור <em>חכם</em><br>לסרטים שלך</h1>
    <p>מגוגל דרייב לארכיון — בלי לגעת בדיסק</p>
  </div>

  <div class="card">
    <div class="field">
      <label>קישור מגוגל דרייב</label>
      <input type="text" id="driveUrl" placeholder="https://drive.google.com/file/d/..." />
    </div>
    <div class="row">
      <div class="field">
        <label>שם קובץ ביעד</label>
        <input type="text" id="fileName" placeholder="film.mp4" />
      </div>
      <div class="field">
        <label>Bucket (אופציונלי)</label>
        <input type="text" id="bucketOverride" placeholder="ברירת מחדל מההגדרות" />
      </div>
    </div>

    <button class="btn" id="pipeBtn" onclick="startPipe()">🚰 הזרם עכשיו!</button>

    <div id="status-box">
      <div id="status-line" class="status loading">
        <div class="spinner" id="spinner"></div>
        <span id="status-text"></span>
      </div>
      <a id="result-link" class="result-link" href="#" target="_blank" style="display:none"></a>
    </div>

    <div class="pipe-diagram">
      <div class="pipe-node"><span class="icon">☁️</span>Google Drive</div>
      <div class="pipe-arrow"></div>
      <div class="pipe-node"><span class="icon">🚰</span>Render</div>
      <div class="pipe-arrow"></div>
      <div class="pipe-node"><span class="icon">🏛️</span>Archive.org</div>
    </div>
  </div>
</main>

<!-- מודל הגדרות -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ הגדרות מפתחות</div>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>

    <div class="field">
      <label>Archive.org — Access Key</label>
      <input type="password" id="archiveKey" placeholder="••••••••••••••••" />
    </div>
    <div class="field">
      <label>Archive.org — Secret Key</label>
      <input type="password" id="archiveSecret" placeholder="••••••••••••••••" />
    </div>
    <div class="field">
      <label>שם Bucket (אוסף)</label>
      <input type="text" id="bucketName" placeholder="my-films-collection" />
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveKeys()">
      💾 שמור ובדוק חיבור
    </button>
    <div id="key-result" class="key-result"></div>
  </div>
</div>

<script>
  // ── בדיקת סטטוס מפתחות בטעינה ──
  async function checkKeysStatus() {
    try {
      const res  = await fetch('/keys-status');
      const data = await res.json();
      const badge = document.getElementById('keys-badge');
      if (data.hasKeys) {
        badge.className = 'badge ok';
        badge.textContent = `✓ ${data.bucketName}`;
      } else {
        badge.className = 'badge err';
        badge.textContent = '⚠ מפתחות חסרים';
      }
    } catch (e) {
      document.getElementById('keys-badge').textContent = '? לא ידוע';
    }
  }

  function openSettings()  { document.getElementById('overlay').classList.add('open'); }
  function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
  function handleOverlay(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }

  async function saveKeys() {
    const key    = document.getElementById('archiveKey').value.trim();
    const secret = document.getElementById('archiveSecret').value.trim();
    const bucket = document.getElementById('bucketName').value.trim();
    const btn    = document.getElementById('saveBtn');
    const result = document.getElementById('key-result');

    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = '⏳ בודק מפתחות...';
    result.style.display = 'none';

    try {
      const res  = await fetch('/save-keys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ archiveKey: key, archiveSecret: secret, bucketName: bucket }),
      });
      const data = await res.json();

      result.style.display = 'block';
      result.className = 'key-result ' + (data.ok ? 'ok' : 'err');
      result.textContent = data.msg;

      if (data.ok) {
        checkKeysStatus();
        setTimeout(closeSettings, 1500);
      }
    } catch (e) {
      result.style.display = 'block';
      result.className = 'key-result err';
      result.textContent = '❌ שגיאת רשת: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '💾 שמור ובדוק חיבור';
    }
  }

  // ── הצינור הראשי ──
  async function startPipe() {
    const driveUrl      = document.getElementById('driveUrl').value.trim();
    const fileName      = document.getElementById('fileName').value.trim();
    const bucketOverride = document.getElementById('bucketOverride').value.trim();

    if (!driveUrl) return setStatus('error', '⚠ הכנס קישור גוגל דרייב');

    const btn = document.getElementById('pipeBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = '⏳ מעביר...';
    document.getElementById('result-link').style.display = 'none';

    const msgs = ['פותח חיבור לגוגל... 📥', 'מזרים לארכיון... 📤', 'הצינור עובד, המתן... 🚰', 'עדיין עובד... קבצים גדולים לוקחים זמן ⏳'];
    let mi = 0;
    setStatus('loading', msgs[0]);
    const iv = setInterval(() => {
      mi = (mi + 1) % msgs.length;
      if (document.getElementById('status-line').classList.contains('loading'))
        document.getElementById('status-text').textContent = msgs[mi];
    }, 4000);

    try {
      const res  = await fetch('/pipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ driveUrl, fileName, bucketName: bucketOverride }),
      });
      const data = await res.json();
      clearInterval(iv);

      if (data.ok) {
        setStatus('success', '✅ ' + data.msg);
        const link = document.getElementById('result-link');
        link.href = data.archiveUrl;
        link.textContent = '🔗 ' + data.archiveUrl;
        link.style.display = 'block';
      } else {
        setStatus('error', data.msg);
      }
    } catch (e) {
      clearInterval(iv);
      setStatus('error', '❌ שגיאת רשת: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '🚰 הזרם עכשיו!';
    }
  }

  function setStatus(type, text) {
    const box  = document.getElementById('status-box');
    const line = document.getElementById('status-line');
    const spin = document.getElementById('spinner');
    box.style.display  = 'block';
    line.className     = 'status ' + type;
    spin.style.display = type === 'loading' ? 'block' : 'none';
    document.getElementById('status-text').textContent = text;
  }

  // טעינה ראשונית
  checkKeysStatus();
</script>
</body>
</html>
