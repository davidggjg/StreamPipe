<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamPipe 🚰</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;
    --accent:#00e5ff;--accent2:#7c3aed;--green:#00e676;
    --red:#ff1744;--yellow:#ffd600;--text:#e2e2f0;--muted:#5a5a7a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none}
  header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.9);backdrop-filter:blur(12px)}
  .logo{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;letter-spacing:2px;color:var(--accent)}
  .logo small{font-size:0.65rem;color:var(--muted);margin-right:8px}
  .header-left{display:flex;align-items:center;gap:10px}
  .badge{font-size:0.68rem;padding:3px 10px;border-radius:20px;border:1px solid;display:flex;align-items:center;gap:4px}
  .badge.ok{border-color:rgba(0,230,118,0.3);color:var(--green)}
  .badge.err{border-color:rgba(255,23,68,0.3);color:var(--red)}
  .badge.warn{border-color:rgba(255,214,0,0.3);color:var(--yellow)}
  .settings-btn{background:none;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;
    border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .settings-btn:hover{border-color:var(--accent);color:var(--accent);transform:rotate(45deg)}
  main{position:relative;z-index:1;max-width:620px;margin:50px auto;padding:0 20px}
  .hero{text-align:center;margin-bottom:36px}
  .hero h1{font-size:2.4rem;font-weight:900;line-height:1.1;margin-bottom:8px}
  .hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{color:var(--muted);font-size:0.9rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;right:0;width:160px;height:2px;background:linear-gradient(90deg,transparent,var(--accent))}
  .instruction{text-align:center;padding:20px 0}
  .instruction .icon{font-size:3rem;margin-bottom:12px}
  .instruction h2{font-size:1.3rem;font-weight:700;margin-bottom:8px}
  .instruction p{color:var(--muted);font-size:0.88rem;line-height:1.6}
  .btn-activate{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#0097a7);
    color:#000;font-family:'Heebo',sans-serif;font-size:0.97rem;font-weight:700;
    border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;margin-top:16px}
  .btn-activate:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,255,0.25)}
  .btn-activate:disabled{opacity:0.45;cursor:not-allowed}
  #activate-result{margin-top:12px;padding:11px 14px;border-radius:8px;
    font-size:0.83rem;border:1px solid;display:none;text-align:center}
  #activate-result.ok{background:rgba(0,230,118,0.05);border-color:rgba(0,230,118,0.25);color:var(--green)}
  #activate-result.err{background:rgba(255,23,68,0.05);border-color:rgba(255,23,68,0.25);color:var(--red)}
  .steps{margin-top:24px;padding:16px;background:rgba(255,255,255,0.015);
    border:1px solid var(--border);border-radius:12px}
  .steps h3{font-size:0.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:12px}
  .step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:0.85rem;color:var(--muted)}
  .step-num{background:var(--accent2);color:#fff;width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
    backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:28px;width:100%;max-width:400px;margin:16px;animation:slideUp 0.2s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
  .modal-title{font-size:1rem;font-weight:700}
  .close-btn{background:none;border:1px solid var(--border);color:var(--muted);
    width:30px;height:30px;border-radius:6px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .close-btn:hover{border-color:var(--red);color:var(--red)}
  .field{margin-bottom:16px}
  label{display:block;font-size:0.7rem;font-weight:500;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:11px 13px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.92rem;
    outline:none;transition:all 0.2s;direction:ltr;text-align:left}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.08)}
  input::placeholder{color:var(--muted);opacity:0.45}
  .btn-save{width:100%;padding:13px;background:var(--accent2);color:#fff;
    font-family:'Heebo',sans-serif;font-size:0.95rem;font-weight:600;
    border:none;border-radius:8px;cursor:pointer;margin-top:6px;transition:all 0.2s}
  .btn-save:hover{background:#6d28d9}
  .key-result{margin-top:12px;padding:11px 14px;border-radius:8px;
    font-size:0.83rem;border:1px solid;display:none}
  .key-result.ok{background:rgba(0,230,118,0.05);border-color:rgba(0,230,118,0.25);color:var(--green)}
  .key-result.err{background:rgba(255,23,68,0.05);border-color:rgba(255,23,68,0.25);color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="logo">STREAMPIPE <small>Telegram → Archive</small></div>
  <div class="header-left">
    <div id="keys-badge" class="badge warn">⏳ טוען...</div>
    <button class="settings-btn" onclick="openSettings()">⚙</button>
  </div>
</header>

<main>
  <div class="hero">
    <h1>צינור <em>חכם</em><br>לסרטים שלך</h1>
    <p>מטלגרם לארכיון — בלי לגעת בדיסק</p>
  </div>

  <div class="card">
    <div class="instruction">
      <div class="icon">🤖</div>
      <h2>הבוט מוכן לעבודה</h2>
      <p>שלח קובץ וידאו לבוט בטלגרם<br>והוא יעלה אותו לארכיון אוטומטית</p>
    </div>

    <button class="btn-activate" onclick="activateBot()">⚡ הפעל בוט / עדכן חיבור</button>
    <div id="activate-result"></div>

    <div class="steps">
      <h3>איך זה עובד</h3>
      <div class="step"><div class="step-num">1</div><span>לחץ "הפעל בוט" למטה</span></div>
      <div class="step"><div class="step-num">2</div><span>פתח את הבוט בטלגרם</span></div>
      <div class="step"><div class="step-num">3</div><span>שלח קובץ וידאו לבוט</span></div>
      <div class="step"><div class="step-num">4</div><span>הבוט יחזיר קישור לארכיון ✅</span></div>
    </div>
  </div>
</main>

<!-- מודל הגדרות — Bot Token בלבד -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ הגדרות בוט</div>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>

    <div class="field">
      <label>🤖 Telegram Bot Token</label>
      <input type="password" id="botToken" placeholder="123456:ABC-DEF..." />
    </div>

    <button class="btn-save" onclick="saveToken()">💾 שמור ובדוק</button>
    <div id="key-result" class="key-result"></div>
  </div>
</div>

<script>
  async function checkStatus() {
    try {
      const res  = await fetch('/keys-status');
      const data = await res.json();
      const badge = document.getElementById('keys-badge');
      if (data.hasKeys) {
        badge.className = 'badge ok';
        badge.textContent = '✓ מוכן';
      } else {
        badge.className = 'badge err';
        badge.textContent = '⚠ הגדר טוקן';
      }
    } catch(e) {}
  }

  function openSettings()  { document.getElementById('overlay').classList.add('open'); }
  function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
  function handleOverlay(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }

  async function saveToken() {
    const token  = document.getElementById('botToken').value.trim();
    const result = document.getElementById('key-result');
    if (!token) {
      result.style.display = 'block';
      result.className = 'key-result err';
      result.textContent = '❌ הכנס Bot Token';
      return;
    }

    result.style.display = 'block';
    result.className = 'key-result';
    result.textContent = '⏳ בודק...';

    try {
      const res  = await fetch('/save-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ botToken: token }),
      });
      const data = await res.json();
      result.className = 'key-result ' + (data.ok ? 'ok' : 'err');
      result.textContent = data.msg;
      if (data.ok) { checkStatus(); setTimeout(closeSettings, 1500); }
    } catch(e) {
      result.className = 'key-result err';
      result.textContent = '❌ שגיאת רשת';
    }
  }

  async function activateBot() {
    const btn    = document.querySelector('.btn-activate');
    const result = document.getElementById('activate-result');
    btn.disabled = true;
    btn.textContent = '⏳ מפעיל...';

    try {
      const res  = await fetch('/set-webhook', { method: 'POST' });
      const data = await res.json();
      result.style.display = 'block';
      result.className = data.ok ? 'ok' : 'err';
      result.textContent = data.msg;
    } catch(e) {
      result.style.display = 'block';
      result.className = 'err';
      result.textContent = '❌ שגיאת רשת';
    } finally {
      btn.disabled = false;
      btn.textContent = '⚡ הפעל בוט / עדכן חיבור';
    }
  }

  checkStatus();
</script>
</body>
</html>
